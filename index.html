#!/bin/bash
# hybrid install script and home page for MAPT
#
# <script type="text/javascript"> document.getElementsByTagName("body")[0].innerHTML=""; </script><!--

install_mapt(){
	if ! git --version | grep "git version" &> /dev/null; then
		sudo apt update
		sudo apt install -y git
	fi

	git clone --filter=tree:0 --recurse-submodules https://github.com/bioMAPT/MAPT.git
	cd MAPT
	./install.sh
}
install_mapt


cat > /dev/null <<EOF
-->
<html>
	<body>
		<h1>Microbio Automatic Photography Tool</h1>
	</body>
</html>
<!--
EOF
